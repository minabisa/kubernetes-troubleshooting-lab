apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-pull-demo
  namespace: troubleshooting-lab
  labels:
    app: image-pull-demo
    incident: imagepullbackoff
spec:
  replicas: 2

  selector:
    matchLabels:
      app: image-pull-demo

  template:
    metadata:
      labels:
        app: image-pull-demo
        incident: imagepullbackoff

    spec:
      containers:
        - name: web
          image: nginx:version-does-not-exist
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 80

          resources:
            requests:
              cpu: 50m
              memory: 64Mi

            limits:
              cpu: 200m
              memory: 128Mi

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stateful-web
  namespace: troubleshooting-lab
  labels:
    app: stateful-web
    incident: statefulset-pv
spec:
  serviceName: stateful-web
  replicas: 1

  selector:
    matchLabels:
      app: stateful-web

  template:
    metadata:
      labels:
        app: stateful-web
        incident: statefulset-pv

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: initialize-content
          image: busybox:1.36
          imagePullPolicy: IfNotPresent

          command:
            - /bin/sh
            - -c
            - |
              if [ ! -f /data/index.html ]; then
                echo "<h1>StatefulSet persistent storage lab</h1>" > /data/index.html
                echo "<p>Pod: ${POD_NAME}</p>" >> /data/index.html
                echo "<p>Initialized: $(date)</p>" >> /data/index.html
              fi

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          securityContext:
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: web-data
              mountPath: /data

      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 50m
              memory: 64Mi

            limits:
              cpu: 200m
              memory: 128Mi

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          volumeMounts:
            - name: web-data
              mountPath: /usr/share/nginx/html

  volumeClaimTemplates:
    - metadata:
        name: web-data
        labels:
          app: stateful-web
          incident: statefulset-pv

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: nonexistent-storage-class

        resources:
          requests:
            storage: 1Gi

    prometheus-operator-validated: "true"
  creationTimestamp: "2026-07-16T00:24:52Z"
  generation: 2
  labels:
    app: observability-demo
    project: kubernetes-troubleshooting-lab
    release: monitoring
  name: observability-demo-alerts
  namespace: monitoring
  resourceVersion: "110836"
  uid: bdfbf5f4-943a-4b27-8c61-95d1cebb3161
spec:
  groups:
  - interval: 15s
    name: observability-demo.availability
    rules:
    - alert: ObservabilityDemoTargetDown
      annotations:
        description: |
          Prometheus has been unable to scrape the observability-demo
          target for more than one minute.
        runbook_url: |
          https://github.com/minabisa/kubernetes-troubleshooting-lab/tree/main/incidents/06-observability
        summary: Observability demo target is down
      expr: |
        (
          up{
            namespace="observability-demo",
            service="observability-demo"
          } == 0
        )
        or
        absent(
          up{
            namespace="observability-demo",
            service="observability-demo"
          }
        )
      for: 1m
      labels:
        category: availability
        service: observability-demo
        severity: critical
        team: devops
    - alert: ObservabilityDemoNoAvailableReplicas
      annotations:
        description: |
          Deployment observability-demo has had fewer than one available
          replica for more than one minute.
        runbook_url: |
          https://github.com/minabisa/kubernetes-troubleshooting-lab/tree/main/incidents/06-observability
        summary: Observability demo has no available replicas
      expr: |
        kube_deployment_status_replicas_available{
          namespace="observability-demo",
          deployment="observability-demo"
        } < 1
      for: 1m
      labels:
        category: availability
        service: observability-demo
        severity: critical
        team: devops
    - alert: ObservabilityDemoReplicaMismatch
      annotations:
        description: |
          The desired replica count is greater than the available replica
          count for more than two minutes.
        summary: Observability demo replica mismatch
      expr: |
        kube_deployment_spec_replicas{
          namespace="observability-demo",
          deployment="observability-demo"
        }
        >
        kube_deployment_status_replicas_available{
          namespace="observability-demo",
          deployment="observability-demo"
        }
      for: 2m
      labels:
        category: availability
        service: observability-demo
        severity: warning
        team: devops
  - interval: 15s
    name: observability-demo.application
    rules:
    - alert: ObservabilityDemoHighErrorRate
      annotations:
        description: |
          More than 10 percent of observability-demo requests have returned
          HTTP 5xx responses for more than one minute.
        runbook_url: |
          https://github.com/minabisa/kubernetes-troubleshooting-lab/tree/main/incidents/06-observability
        summary: High HTTP 5xx error percentage
      expr: |
        (
          100 *
          sum(
            rate(
              demo_http_requests_total{
                namespace="observability-demo",
                status=~"5.."
              }[2m]
            )
          )
          /
          clamp_min(
            sum(
              rate(
                demo_http_requests_total{
                  namespace="observability-demo"
                }[2m]
              )
            ),
            0.001
          )
        ) > 10
      for: 1m
      labels:
        category: errors
        service: observability-demo
        severity: warning
        team: application
    - alert: ObservabilityDemoHighLatency
      annotations:
        description: |
          The p95 request latency for observability-demo has exceeded one
          second for more than one minute.
        runbook_url: |
          https://github.com/minabisa/kubernetes-troubleshooting-lab/tree/main/incidents/06-observability
        summary: High p95 application latency
      expr: |
        histogram_quantile(
          0.95,
          sum by (le) (
            rate(
              demo_http_request_duration_seconds_bucket{
                namespace="observability-demo"
              }[2m]
            )
          )
        ) > 1
      for: 1m
      labels:
        category: latency
        service: observability-demo
        severity: warning
        team: application
  - interval: 15s
    name: observability-demo.resources
    rules:
    - alert: ObservabilityDemoContainerRestart
      annotations:
        description: |
          Container application in Pod {{ $labels.pod }} restarted during
          the previous five minutes.
        runbook_url: |
          https://github.com/minabisa/kubernetes-troubleshooting-lab/tree/main/incidents/06-observability
        summary: Application container restarted
      expr: |
        increase(
          kube_pod_container_status_restarts_total{
            namespace="observability-demo",
            container="application"
          }[5m]
        ) > 0
      labels:
        category: stability
        service: observability-demo
        severity: warning
        team: devops
    - alert: ObservabilityDemoHighCPU
      annotations:
        description: |
          Pod {{ $labels.pod }} has consumed more than 0.20 CPU cores for
          more than two minutes.
        runbook_url: |
          https://github.com/minabisa/kubernetes-troubleshooting-lab/tree/main/incidents/06-observability
        summary: High application CPU usage
      expr: |
        sum by (pod) (
          rate(
            container_cpu_usage_seconds_total{
              namespace="observability-demo",
              container="application",
              pod=~"observability-demo-.*"
            }[2m]
          )
        ) > 0.20
      for: 2m
      labels:
        category: resources
        service: observability-demo
        severity: warning
        team: devops
    - alert: ObservabilityDemoHighMemory
      annotations:
        description: |
          Pod {{ $labels.pod }} has used more than 200 MiB of working-set
          memory for more than two minutes.
        runbook_url: |
          https://github.com/minabisa/kubernetes-troubleshooting-lab/tree/main/incidents/06-observability
        summary: High application memory usage
      expr: |
        sum by (pod) (
          container_memory_working_set_bytes{
            namespace="observability-demo",
            container="application",
            pod=~"observability-demo-.*"
          }
        ) > 200 * 1024 * 1024
      for: 2m
      labels:
        category: resources
        service: observability-demo
        severity: warning
        team: devops

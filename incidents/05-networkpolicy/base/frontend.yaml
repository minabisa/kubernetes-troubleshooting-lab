apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: network-policy-lab
  labels:
    app: frontend
    tier: web
spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
        tier: web
        access: backend

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: client
          image: curlimages/curl:8.12.1
          imagePullPolicy: IfNotPresent

          command:
            - /bin/sh
            - -c
            - sleep infinity

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 10m
              memory: 16Mi

            limits:
              cpu: 50m
              memory: 32Mi

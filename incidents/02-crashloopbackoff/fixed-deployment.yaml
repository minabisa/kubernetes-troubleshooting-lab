apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: troubleshooting-lab
  labels:
    app: crashloop-demo
    incident: crashloopbackoff
spec:
  replicas: 2

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: crashloop-demo

  template:
    metadata:
      labels:
        app: crashloop-demo
        incident: crashloopbackoff

    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: application
          image: crashloop-demo:v2
          imagePullPolicy: Never

          ports:
            - name: http
              containerPort: 8080

          env:
            - name: APP_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: crashloop-demo-config
                  key: APP_MESSAGE

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 50m
              memory: 32Mi

            limits:
              cpu: 200m
              memory: 128Mi

          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            failureThreshold: 15
            timeoutSeconds: 1

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 2

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
